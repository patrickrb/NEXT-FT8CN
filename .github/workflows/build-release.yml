name: Build & Release APK

on:
  push:
    branches: [release, Dev]
    tags:
      - 'v*'
  pull_request:
    branches: [release]

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Cache Gradle dependencies
        uses: actions/cache@v4
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
          key: gradle-${{ runner.os }}-${{ hashFiles('ft8cn/**/*.gradle*', 'ft8cn/gradle-wrapper.properties') }}
          restore-keys: |
            gradle-${{ runner.os }}--

      - name: Grant execute permission for gradlew
        run: chmod +x ft8cn/gradlew

      - name: Build APK
        working-directory: ft8cn
        run: ./gradlew assembleRelease

      - name: Rename APK
        run: mv ft8cn/app/build/outputs/apk/release/app-release.apk ft8cn/app/build/outputs/apk/release/FT8CN-${{ github.ref_name }}.apk
        if: startsWith(github.ref, 'refs/tags/v')

      - name: Upload APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: ft8cn-release
          path: ft8cn/app/build/outputs/apk/release/*.apk

      - name: Create GitHub Release
        if: startsWith(github.ref, 'refs/tags/v')
        uses: softprops/action-gh-release@v2
        with:
          files: ft8cn/app/build/outputs/apk/release/FT8CN-*.apk
          generate_release_notes: true
          append_body: true
          body: |

            ---
            Vibecoded with spite on I-70 enroute to Dayton Hamvention.
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
